<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HC Quality — Controle de Qualidade Laboratorial</title>
    <meta name="description" content="Sistema de controle interno de qualidade para laboratórios clínicos — Hematologia, Imunologia, Coagulação e Uroanálise." />

    <!-- PWA — instalação em desktop e mobile -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <meta name="theme-color" content="#3b82f6" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="CQ Labclin" />
    <meta name="mobile-web-app-capable" content="yes" />

    <script>
      // Zero FOUC — executa ANTES do React hidratar
      (function () {
        var html = document.documentElement;
        var savedTheme = localStorage.getItem('cq-theme');
        if (
          savedTheme === 'dark' ||
          (!savedTheme && window.matchMedia('(prefers-color-scheme: dark)').matches)
        ) {
          html.classList.add('dark');
        } else {
          html.classList.remove('dark');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
