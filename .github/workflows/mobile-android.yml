name: Mobile Android Build & Distribute

on:
  push:
    branches: [main]
    paths: ['hc-quality-mobile/**']
  workflow_dispatch:
    inputs:
      track:
        description: 'Distribution track'
        required: true
        default: 'internal'
        type: choice
        options: [internal, alpha, beta, production]

jobs:
  build-android:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: hc-quality-mobile

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: hc-quality-mobile/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('hc-quality-mobile/android/**/*.gradle*') }}
          restore-keys: |
            gradle-

      - name: Check native Android project exists
        id: check-android
        run: |
          if [ -f "android/app/build.gradle" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "::warning::Android native project not yet generated. Run 'npx react-native init' or 'npx react-native eject' first."
          fi

      - name: Decode keystore
        if: steps.check-android.outputs.exists == 'true'
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android/app/hcquality.keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}

      - name: Build release APK
        if: steps.check-android.outputs.exists == 'true'
        run: |
          cd android
          ./gradlew assembleRelease
        env:
          ANDROID_KEYSTORE_FILE: hcquality.keystore
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Upload APK artifact
        if: steps.check-android.outputs.exists == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: hcquality-release-${{ github.sha }}
          path: hc-quality-mobile/android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30

      - name: Upload to Firebase App Distribution
        if: steps.check-android.outputs.exists == 'true'
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_ANDROID_APP_ID }}
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          groups: internal-testers
          file: hc-quality-mobile/android/app/build/outputs/apk/release/app-release.apk
          releaseNotes: 'Build from ${{ github.sha }} — ${{ github.event.head_commit.message }}'
