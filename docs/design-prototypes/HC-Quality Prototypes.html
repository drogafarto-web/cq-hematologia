<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>hc-quality · Telas unificadas (light + dark)</title>

<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500&family=Source+Sans+3:wght@400;500;600;700&family=Source+Code+Pro:wght@400;500&display=swap" rel="stylesheet" />

<!-- Tailwind play CDN: lets us use Tailwind utility classes incl arbitrary values -->
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    darkMode: 'class',
    theme: {
      extend: {
        fontFamily: {
          sans: ['var(--font-sans)','system-ui','sans-serif'],
          mono: ['var(--font-mono)','ui-monospace','monospace'],
        },
      },
    },
  };
</script>

<!-- Local tokens (CSS variables) -->
<link rel="stylesheet" href="prototypes/tokens.css" />

<!-- Mini hardening: body bg matches canvas so there's no flash -->
<style>
  html, body, #root { height: 100%; margin: 0; }
  body { background: #f0eee9; font-family: var(--font-sans); }
  /* Avoid focus rings inside the canvas — looks like noise in the preview */
  #root :focus-visible { outline: none; }
</style>

<!-- React + Babel -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

</head>
<body>
<div id="root"></div>

<!-- Order matters: starter components first, then primitives, then screens, then app -->
<script type="text/babel" src="prototypes/design-canvas.jsx"></script>
<script type="text/babel" src="prototypes/tweaks-panel.jsx"></script>
<script type="text/babel" src="prototypes/shell.jsx"></script>
<script type="text/babel" src="prototypes/screens-core.jsx"></script>
<script type="text/babel" src="prototypes/screens-quality.jsx"></script>
<script type="text/babel" src="prototypes/screens-ops.jsx"></script>
<script type="text/babel" src="prototypes/screens-adaptive.jsx"></script>
<script type="text/babel" src="prototypes/foundation.jsx"></script>
<script type="text/babel" src="prototypes/app.jsx"></script>

</body>
</html>
